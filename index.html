<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPad - Unified Wireless Controller</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }
        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        @media(min-width: 480px) {
            .btn-group {
                flex-direction: row;
                justify-content: center;
            }
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-windows {
            background-color: #2b2b2b;
            color: #ffffff;
            border: 1px solid #444444;
        }
        .btn-windows:hover {
            background-color: #3a3a3a;
            border-color: #555555;
        }
        .btn-android {
            background-color: #4CAF50;
            color: #ffffff;
            border: none;
        }
        .btn-android:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AirPad Controller</h1>
        <p>Turn your Android device into a low-latency wireless gamepad for your Windows PC instantly over Wi-Fi. Zero configuration required.</p>
        
        <div class="btn-group">
            <a href="#" class="btn btn-windows">📥 Download for Windows (.exe)</a>
            <a href="#" class="btn btn-android">📱 Get Android App (.apk)</a>
        </div>
    </div>

</body>
</html>
