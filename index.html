<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Console Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: #242424;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }
        h1 {
            font-size: 2.3rem;
            color: #ffffff;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-windows {
            background-color: #333333;
            color: #ffffff;
            border: 1px solid #444444;
        }
        .btn-windows:hover {
            background-color: #444444;
        }
        .btn-android {
            background-color: #2e7d32;
            color: #ffffff;
        }
        .btn-android:hover {
            background-color: #388e3c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gaming Console Ecosystem</h1>
        <p>Turn your phone into a low-latency wireless controller for your PC over Wi-Fi. Download the desktop server and mobile client below.</p>
        
        <div class="btn-group">
            <a href="https://github.com/Nakul1432/Gaming-Console/releases/download/v.1.0/Gaming.console.windows.jar" class="btn btn-windows">📥 Download Desktop Server (.jar / .exe)</a>
            <a href="https://github.com/Nakul1432/Gaming-Console/releases/download/v.1.1/Gaming.console.mobile.apk class="btn btn-android">📱 Download Android App (.apk)</a>
        </div>
    </div>

</body>
</html>
